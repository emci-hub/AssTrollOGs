# Supabase project configuration.
#
# project_id links this repo to the GitHub-linked project (see .env's comment
# and supabase/bootstrap.sql — "emci-hub's Project", NOT the empty project
# auto-provisioned by the StackBlitz integration). This file was missing,
# which is very likely why Supabase's Preview Branching integration couldn't
# resolve which project to branch from and failed with a 502 — the CLI and
# the GitHub App both require this file to exist at the repo root.
project_id = "plsugxnukitbuxbtfgow"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = false

[storage]
enabled = false
