<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em-Pal — Palworld Server</title>
<meta name="robots" content="noindex">
<!--
  Plain static info page. NOT part of the AssTrollOGs app/build — no JS
  modules, no app state, nothing that can break or be broken by the app.
  To update the server info, edit the three values right below.
-->
<style>
  :root {
    --bg: #0c0c0e;
    --card: #17171a;
    --border: #27272a;
    --text: #f4f4f5;
    --muted: #a1a1aa;
    --accent: #818cf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .page { max-width: 640px; width: 100%; }
  .poster-frame { border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .poster-frame svg { width: 100%; height: auto; display: block; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 1rem; margin-bottom: 12px; }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 4px;
  }
  .row .value {
    flex: 1;
    font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  .row button {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .row button:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .row-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 12px 2px;
  }
  .back {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 0.8rem;
    color: var(--muted);
    text-decoration: none;
  }
  .back:hover { color: var(--accent); }
</style>
</head>

  <div class="card">
    <h2>Connect</h2>

    <div class="row">
      <span class="value" id="ip">136.118.89.15</span>
      <button onclick="copyField('ip', this)">Copy</button>
    </div>
    <div class="row-label">Server IP</div>

    <div class="row">
      <span class="value" id="port">8211</span>
      <button onclick="copyField('port', this)">Copy</button>
    </div>
    <div class="row-label">Port</div>

    <div class="row">
      <span class="value" id="password" data-real="ato">••••••</span>
      <button id="password-btn" onclick="revealPassword()">Reveal</button>
    </div>
    <div class="row-label">Password</div>
  </div>

  <a class="back" href="/">← Back to AssTrollOGs</a>
</div>

<script>
  // Plain inline JS, self-contained — nothing here touches or imports the
  // AssTrollOGs app in any way.
  function revealPassword() {
    var el = document.getElementById('password');
    var btn = document.getElementById('password-btn');
    el.textContent = el.getAttribute('data-real');
    btn.textContent = 'Copy';
    btn.setAttribute('onclick', "copyField('password', this)");
  }

  function copyField(id, btn) {
    var el = document.getElementById(id);
    navigator.clipboard.writeText(el.textContent).then(function () {
      var original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(function () { btn.textContent = original; }, 1500);
    });
  }
</script>
</body>
</html>
